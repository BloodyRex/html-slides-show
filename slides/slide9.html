<!DOCTYPE html>

<head>

<body>
  <div class="slide-page animate-fade">

          <ul class="pixel-list">
            <li class="pixel-list-item"><strong>整理：</strong> 往期剧本打包成"记忆库"</li>

              <p><strong>输入：</strong> "我想写个关于分享的故事"</p>
              <p class="mt-2"><strong>输出：</strong> 自动检索库 -> 极高完成度大纲</p>

            </div>

    <footer class="slide-footer">

      <div class="slide-progress"><div class="slide-progress-bar pct-60"></div></div>
