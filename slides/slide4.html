<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第一阶段：痛点 - 幻灯片4</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/slides.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* 确保两栏布局中的列可以滚动 */
    .two-column-layout .column {
      min-height: 0;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="slide-page slide-page-bg animate-fade">
    <header class="slide-header">
      <h1 class="slide-title">第一阶段：学会提问</h1>
      <p class="slide-subtitle">STAGING THE PROBLEM</p>
    </header>

    <main class="slide-content">
      <div class="two-column-layout">
        <div class="column">
          <h2 class="column-title">1. 起步痛点</h2>
          <div class="pixel-card flex-1 mb-3">
            <p><strong>困境：</strong> 每次对话都是"从零开始"</p>
            <p class="mt-2">AI像个勤奋但"健忘"的实习生，每次都要重新交代背景、人设和风格。</p>
          </div>
          <div class="quote-box">
             "AI给出的剧本大纲，能用，但不够用。"
          </div>
        </div>

        <div class="column">
          <h2 class="column-title">2. 典型表现</h2>
          <ul class="pixel-list">
            <li class="pixel-list-item">风格不统一，忽高忽低</li>
            <li class="pixel-list-item">人设跑偏，缺乏深层次理解</li>
            <li class="pixel-list-item">无法复用历史创作资产</li>
          </ul>

          <div class="mt-3 image-container" style="border: var(--border-sharp); padding: calc(var(--pixel-size) * 2); background: white; cursor: pointer;">
            <img src="../assets/images/2.png" alt="痛点示意图" class="slide-image zoomable-image" style="width: 100%; height: auto;">
            <p class="image-caption font-pixel font-0-8 mt-2">点击图片查看大图</p>
          </div>

          <div class="highlight-box mt-auto">
            <p class="font-pixel font-0-8">帮我写个大纲...</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="slide-footer">
      <div class="slide-number">4 / 16</div>
      <div class="slide-progress"><div class="slide-progress-bar pct-25"></div></div>
      <div class="slide-title">第一阶段：起步痛点</div>
    </footer>
  </div>
</body>
</html>
