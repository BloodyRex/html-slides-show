<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第二阶段：工作流构建 - 幻灯片6</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/slides.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .workflow-container {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-sm);
      flex: 1;
      min-height: 0;
    }
    .workflow-description {
      background: rgba(255, 255, 255, 0.95);
      border: var(--border-sharp);
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: calc(var(--pixel-size) * 2);
      box-shadow: var(--shadow-pixel);
      flex-shrink: 0;
    }
    .workflow-steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-md);
      margin: var(--spacing-xs) 0;
      flex-shrink: 0;
    }
    .step-card {
      background: var(--gradient-primary);
      border: var(--border-sharp);
      padding: var(--spacing-md);
      text-align: center;
      border-radius: calc(var(--pixel-size) * 2);
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .step-card h3 {
      font-size: 1.25rem !important; /* 调大中间3个文字框文字大小 */
      line-height: 1.2;
    }
    /* 核心工作流网格排版：统一色彩为 bg-secondary 系列，调整尺寸 */
    .pixel-card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 改为四列，宽度增加 */
      gap: var(--spacing-sm);
      width: 100%;
      flex: 1;
    }
    .pixel-card-item {
      min-height: 120px !important; /* 调整高度以适应内容 */
      padding: var(--spacing-md) !important;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: var(--gradient-secondary) !important;
      color: white !important;
    }
    .pixel-card-item .card-title {
      font-size: 1.1rem;
      margin-bottom: 4px;
      color: white;
    }
    .pixel-card-item .card-description {
      font-size: 0.9rem;
      line-height: 1.3;
      color: rgba(255,255,255,0.9);
    }
    /* 减少最下方空白 */
    .slide-content {
      justify-content: flex-start;
    }
    .dify-title {
      font-size: 1.4rem;
      margin-bottom: 4px;
    }
    .dify-desc {
      font-size: 1.1rem;
    }
    .workflow-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-bottom: var(--spacing-md);
    }
    .grid-title {
      margin-bottom: 12px;
      font-size: 1.4rem;
    }
    /* New styles added from instruction */
    .profile-icon {
      border: var(--border-sharp);
      width: 180px;
      height: 180px;
    }
    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .two-column-layout .column {
      min-height: 0;
      overflow-y: auto;
      /* scrollbar properties are progressively enhanced for modern browsers */
      scrollbar-width: thin;
      scrollbar-color: var(--color-accent) var(--color-dark);
    }
    .pain-point-card {
      min-height: 250px;
    }
    .problem-img-frame {
      border: var(--border-sharp);
      padding: calc(var(--pixel-size) * 2);
      background: white;
      cursor: pointer;
    }
    .problem-img {
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="slide-page slide-page-bg animate-fade">
    <header class="slide-header">
      <h1 class="slide-title">第二阶段：流程封装（工作流构建）</h1>
      <p class="slide-subtitle">FROM CHAT TO ASSEMBLY LINE</p>
    </header>

    <main class="slide-content">
      <div class="workflow-container">
        <div class="workflow-description">
          <h2 class="content-title dify-title">Dify + API + 向量知识库</h2>
          <p class="dify-desc">将剧本资产转化为<strong>向量数据库</strong>，让AI具备长期记忆，实现稳定输出。</p>
        </div>

        <div class="workflow-steps">
          <div class="step-card">
            <h3 class="font-pixel">资产数字化</h3>
          </div>
          <div class="step-card">
            <h3 class="font-pixel">流程编排</h3>
          </div>
          <div class="step-card">
            <h3 class="font-pixel">稳定交付</h3>
          </div>
        </div>

        <div class="workflow-description workflow-section">
          <h2 class="content-title grid-title">四大核心工作流</h2>
          <div class="pixel-card-grid">
            <div class="pixel-card-item">
              <div class="card-title">大纲生成器</div>
              <p class="card-description">自动产出结构完整的大纲</p>
            </div>
            <div class="pixel-card-item">
              <div class="card-title">脚本创作</div>
              <p class="card-description">生成详细对话与剧本</p>
            </div>
            <div class="pixel-card-item">
              <div class="card-title">海报文案</div>
              <p class="card-description">自动生成创意宣传文案</p>
            </div>
            <div class="pixel-card-item">
              <div class="card-title">格式整理师</div>
              <p class="card-description">统一多端剧本呈现标准</p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="slide-footer">
      <div class="slide-number">6 / 16</div>
      <div class="slide-progress"><div class="slide-progress-bar pct-37-5"></div></div>
      <div class="slide-title">第二阶段：工作流构建</div>
    </footer>
  </div>
</body>
</html>
