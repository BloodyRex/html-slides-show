<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>核心进化路径 - 幻灯片3</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/slides.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .timeline-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--spacing-lg) 0;
    }
    .timeline-item {
      transition: transform 0.2s;
    }
    .timeline-item:hover {
      transform: translateY(-5px);
    }
  </style>
</head>
<body>
  <div class="slide-page slide-page-bg animate-fade">
    <header class="slide-header">
      <h1 class="slide-title">核心进化路径</h1>
      <p class="slide-subtitle">MY EVOLUTION PATH</p>
    </header>

    <main class="slide-content">
      <div class="timeline-wrap">
        <div class="timeline-container">
          <div class="timeline-track"></div>
          <div class="timeline-items">
            <div class="timeline-item">
              <div class="timeline-node">1</div>
              <h3 class="timeline-title">学会提问</h3>
              <p class="timeline-description">把AI当同事，交代背景，达到及格线</p>
            </div>
            <div class="timeline-item">
              <div class="timeline-node">2</div>
              <h3 class="timeline-title">流程封装</h3>
              <p class="timeline-description">用Dify构建工作流，按工序生产</p>
            </div>
            <div class="timeline-item">
              <div class="timeline-node">3</div>
              <h3 class="timeline-title">多模态扩展</h3>
              <p class="timeline-description">快速生成视频参考，提升沟通效率</p>
            </div>
            <div class="timeline-item">
              <div class="timeline-node">4</div>
              <h3 class="timeline-title">创造技能</h3>
              <p class="timeline-description">Claude+反重力，打造专家级Skill</p>
            </div>
            <div class="timeline-item">
              <div class="timeline-node">5</div>
              <h3 class="timeline-title">玩转自动化</h3>
              <p class="timeline-description">GitHub Actions，24H不间断服务</p>
            </div>
          </div>
        </div>
      </div>


    </main>

    <footer class="slide-footer">
      <div class="slide-number">3 / 15</div>
      <div class="slide-progress"><div class="slide-progress-bar pct-20"></div></div>
      <div class="slide-title">核心进化路径</div>
    </footer>
  </div>
</body>
</html>
