<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第三阶段：多模态扩展 - 幻灯片8</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/slides.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .two-column-layout .column {
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: var(--spacing-md);
    }
    
    /* 采用深色一体化卡片增加可读性 */
    .pain-points-card {
      background: var(--color-dark) !important;
      border: var(--border-sharp);
      border-color: var(--color-accent);
      padding: var(--spacing-lg);
      border-radius: calc(var(--pixel-size) * 3);
      color: white !important;
      flex: 1;
    }
    .pain-points-card .column-title {
      color: var(--color-accent);
      border-bottom: 3px solid var(--color-accent);
      padding-bottom: 8px;
    }
    .section-title {
      font-family: var(--font-pixel);
      font-size: 1.2rem;
      margin-top: 20px;
      margin-bottom: 12px;
      color: var(--color-error);
    }
    .pixel-list-item {
      background: transparent !important;
      color: white !important;
      border-color: rgba(255,255,255,0.2) !important;
      padding: 12px !important;
      margin-bottom: 12px !important;
      font-size: 1.1rem !important;
    }

    /* 右侧布局调整 */
    .solution-box {
      background: var(--gradient-accent);
      border: var(--border-sharp);
      padding: var(--spacing-md);
      border-radius: calc(var(--pixel-size) * 2);
      color: var(--color-dark);
      margin-bottom: var(--spacing-md);
    }
    .solution-text {
      font-weight: 600;
    }
    .grok-card {
      background: var(--gradient-surface) !important;
      border: var(--border-sharp) !important;
      padding: var(--spacing-lg) !important;
      min-height: 180px !important; /* 增加高度以承载更多文字 */
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    .card-description {
      line-height: 1.6 !important;
    }
    .image-frame {
      border: var(--border-sharp);
      background: white;
      padding: 4px;
      margin-top: auto;
    }
    .new-requirement-text {
      font-size: 1.1rem;
    }
    .visual-ref-img {
      width: 100%;
      height: auto;
      max-height: 150px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="slide-page slide-page-bg animate-fade">
    <header class="slide-header">
      <h1 class="slide-title">第三阶段：多模态扩展（影像共核）</h1>
      <p class="slide-subtitle">BEYOND TEXT: VISUAL REFERENCE</p>
    </header>

    <main class="slide-content">
      <div class="two-column-layout">
        <div class="column">
          <div class="pain-points-card">
            <h2 class="column-title">阻滞与冲突</h2>
            
            <p class="mt-2 new-requirement-text"><strong>新需求：</strong> 剧本完成后由于理解差异，急需"视觉参考"来统一团队认知。</p>
            
            <h3 class="section-title">高难度系数 (High Bar)</h3>
            <ul class="pixel-list">
              <li class="pixel-list-item"><strong>成本压力：</strong> 专业 MJ 工具月费高昂</li>
              <li class="pixel-list-item"><strong>硬件瓶颈：</strong> 本地部署对显卡要求极大</li>
              <li class="pixel-list-item"><strong>反复损耗：</strong> 效率低 & 理解偏差导致的沟通内耗</li>
            </ul>
          </div>
        </div>

        <div class="column">
          <div class="solution-box">
            <p class="solution-text">核心逻辑：快速呈现"氛围感"，用免费云端工具取代繁复流程。</p>
          </div>
          
          <div class="pixel-card-item grok-card">
            <div class="card-title color-primary text-pixel">豆包 / Grok</div>
            <p class="card-description">极速生成逼真场景草图，支持各种艺术风格微调，且完全零成本。无需本地硬件，随时随地开启视觉对齐。</p>
          </div>

          <div class="image-frame mt-3">
            <img src="../assets/images/6.png" alt="多模态扩展示意图" class="slide-image zoomable-image visual-ref-img">
          </div>
        </div>
      </div>
    </main>

    <footer class="slide-footer">
      <div class="slide-number">8 / 16</div>
      <div class="slide-progress"><div class="slide-progress-bar pct-50"></div></div>
      <div class="slide-title">第三阶段：多模态扩展</div>
    </footer>
  </div>

  <div id="lightbox-overlay" class="lightbox-overlay">
    <div class="lightbox-content">
      <button class="lightbox-close">✕</button>
      <img class="lightbox-image" src="" alt="">
      <p class="lightbox-caption"></p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const lightboxOverlay = document.getElementById('lightbox-overlay');
      const lightboxImage = lightboxOverlay.querySelector('.lightbox-image');
      const lightboxCaption = lightboxOverlay.querySelector('.lightbox-caption');

      document.addEventListener('click', function(event) {
        const zoomableImg = event.target.closest('.zoomable-image');
        if (zoomableImg) {
          event.preventDefault();
          lightboxImage.src = zoomableImg.src;
          lightboxImage.alt = zoomableImg.alt || '放大图片';
          lightboxCaption.textContent = zoomableImg.alt || '';
          lightboxOverlay.classList.add('active');
        }

        if (event.target === lightboxOverlay || event.target.closest('.lightbox-close')) {
          event.preventDefault();
          lightboxOverlay.classList.remove('active');
        }
      });
    });
  </script>
</body>
</html>
