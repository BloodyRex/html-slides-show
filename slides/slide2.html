<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分享人介绍 - 幻灯片2</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/slides.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* 减小卡片高度，使其完全显示在大框内 */
    .pixel-card-item {
      padding: var(--spacing-sm);
      min-height: 80px !important;
    }
    .pixel-card-item .card-title {
      font-size: 1rem;
      margin-bottom: 4px;
    }
    .pixel-card-item .card-description {
      font-size: 0.9rem;
      line-height: 1.3;
    }
    .pixel-card-grid {
      gap: var(--spacing-sm);
    }
    .profile-icon {
      border: var(--border-sharp);
      width: 180px;
      height: 180px;
    }
    .profile-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="slide-page slide-page-bg animate-fade">
    <header class="slide-header">
      <h1 class="slide-title">分享人介绍</h1>
      <p class="slide-subtitle">WHO AM I</p>
    </header>

    <main class="slide-content">
      <div class="sidebar-layout">
        <div class="main-content">
          <section class="mb-4">
            <h2 class="content-title">基本信息</h2>
            <ul class="pixel-list">
              <li class="pixel-list-item"><strong>Rex</strong> - 儿童教育领域创业者</li>
              <li class="pixel-list-item">专注于<strong>剧本策划</strong>与<strong>内容迭代</strong></li>
              <li class="pixel-list-item">核心职能：与文字打交道，构建故事灵魂</li>
            </ul>
          </section>
          
          <section>
            <h2 class="content-title">日常挑战</h2>
            <div class="pixel-card-grid grid-1-col">
              <div class="pixel-card-item">
                <div class="card-title">逻辑构建</div>
                <p class="card-description">从零碎想法到严谨的剧本大纲</p>
              </div>
              <div class="pixel-card-item">
                <div class="card-title">语言润色</div>
                <p class="card-description">打磨每一句台词，提升对白质感</p>
              </div>
            </div>
          </section>
        </div>

        <aside class="sidebar flex-center flex-column text-center">
          <div class="icon-box mb-3 bg-white flex-center profile-icon">
            <img src="../assets/images/1.png" alt="Rex的卡通形象" class="slide-image zoomable-image profile-img">
          </div>
          <p class="font-pixel text-uppercase font-0-8 color-white">REX</p>
          <p class="mt-2 font-0-9 opacity-0-8">Content Entrepreneur</p>
        </aside>
      </div>
    </main>

    <footer class="slide-footer">
      <div class="slide-number">2 / 16</div>
      <div class="slide-progress"><div class="slide-progress-bar pct-12-5"></div></div>
      <div class="slide-title">分享人介绍</div>
    </footer>
  </div>

  <!-- Lightbox Modal -->
  <div id="lightbox-overlay" class="lightbox-overlay">
    <div class="lightbox-content">
      <button class="lightbox-close" aria-label="关闭">✕</button>
      <img class="lightbox-image" src="" alt="">
      <p class="lightbox-caption"></p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const lightboxOverlay = document.getElementById('lightbox-overlay');
      const lightboxImage = lightboxOverlay.querySelector('.lightbox-image');
      const lightboxCaption = lightboxOverlay.querySelector('.lightbox-caption');

      document.addEventListener('click', function(event) {
        const zoomableImg = event.target.closest('.zoomable-image');
        if (zoomableImg) {
          event.preventDefault();
          lightboxImage.src = zoomableImg.src;
          lightboxImage.alt = zoomableImg.alt || '放大图片';
          lightboxCaption.textContent = zoomableImg.alt || '';
          lightboxOverlay.classList.add('active');
        }

        if (event.target === lightboxOverlay || event.target.closest('.lightbox-close')) {
          event.preventDefault();
          lightboxOverlay.classList.remove('active');
        }
      });

      document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
          lightboxOverlay.classList.remove('active');
        }
      });
    });
  </script>

</body>
</html>
