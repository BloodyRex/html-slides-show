<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分享人介绍 - 幻灯片2</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/slides.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* 调整卡片描述文字，避免超出 */
    .pixel-card-item .card-description {
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .pixel-card-grid {
      gap: var(--spacing-md);
    }
  </style>
</head>
<body>
  <div class="slide-page slide-page-bg animate-fade">
    <header class="slide-header">
      <h1 class="slide-title">分享人介绍</h1>
      <p class="slide-subtitle">WHO AM I</p>
    </header>

    <main class="slide-content">
      <div class="sidebar-layout">
        <div class="main-content">
          <section class="mb-4">
            <h2 class="content-title">基本信息</h2>
            <ul class="pixel-list">
              <li class="pixel-list-item"><strong>Rex</strong> - 儿童教育领域创业者</li>
              <li class="pixel-list-item">专注于<strong>剧本策划</strong>与<strong>内容迭代</strong></li>
              <li class="pixel-list-item">核心职能：与文字打交道，构建故事灵魂</li>
            </ul>
          </section>
          
          <section>
            <h2 class="content-title">日常挑战</h2>
            <div class="pixel-card-grid">
              <div class="pixel-card-item">
                <div class="card-title">逻辑构建</div>
                <p class="card-description">从零碎想法到严谨的剧本大纲</p>
              </div>
              <div class="pixel-card-item">
                <div class="card-title">语言润色</div>
                <p class="card-description">打磨每一句台词，提升对白质感</p>
              </div>
            </div>
          </section>
        </div>

        <aside class="sidebar flex-center flex-column text-center">
          <div class="icon-box mb-3 font-4 w-100 h-100 bg-white flex-center">👤</div>
          <p class="font-pixel text-uppercase font-0-8 color-white">REX</p>
          <p class="mt-2 font-0-9 opacity-0-8">Content Entrepreneur</p>
        </aside>
      </div>
    </main>

    <footer class="slide-footer">
      <div class="slide-number">2 / 15</div>
      <div class="slide-progress"><div class="slide-progress-bar pct-13-3"></div></div>
      <div class="slide-title">分享人介绍</div>
    </footer>
  </div>
</body>
</html>
