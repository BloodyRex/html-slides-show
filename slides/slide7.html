<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视觉参考图集 - 幻灯片7</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/slides.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* 三栏布局 */
    .three-column-layout {
      display: flex;
      gap: calc(var(--pixel-size) * 4);
      height: 100%;
    }
    .three-column-layout .column {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    /* 图片容器 */
    .image-card {
      border: var(--border-sharp);
      background: white;
      padding: calc(var(--pixel-size) * 2);
      cursor: pointer;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .image-card img {
      width: 100%;
      height: auto;
      flex: 1;
      object-fit: contain;
    }
    .image-card .caption {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.8rem;
      margin-top: calc(var(--pixel-size) * 2);
      text-align: center;
      color: var(--color-dark);
    }
  </style>
</head>
<body>
  <div class="slide-page slide-page-bg animate-fade">
    <header class="slide-header">
      <h1 class="slide-title">视觉参考图集</h1>
      <p class="slide-subtitle">VISUAL REFERENCE GALLERY</p>
    </header>

    <main class="slide-content">
      <div class="three-column-layout">
        <!-- 图片3 -->
        <div class="column">
          <h2 class="column-title">场景草图示例</h2>
          <div class="image-card">
            <img src="../assets/images/3.png" alt="场景草图示例" class="slide-image zoomable-image">
            <p class="caption">点击放大查看细节</p>
          </div>
          <div class="pixel-card mt-3">
            <p><strong>用途：</strong> 快速对齐团队对场景布局的理解</p>
          </div>
        </div>

        <!-- 图片4 -->
        <div class="column">
          <h2 class="column-title">氛围图示例</h2>
          <div class="image-card">
            <img src="../assets/images/4.png" alt="氛围图示例" class="slide-image zoomable-image">
            <p class="caption">点击放大查看细节</p>
          </div>
          <div class="pixel-card mt-3">
            <p><strong>用途：</strong> 统一视觉风格和情感基调</p>
          </div>
        </div>

        <!-- 图片5 -->
        <div class="column">
          <h2 class="column-title">角色设定示例</h2>
          <div class="image-card">
            <img src="../assets/images/5.png" alt="角色设定示例" class="slide-image zoomable-image">
            <p class="caption">点击放大查看细节</p>
          </div>
          <div class="pixel-card mt-3">
            <p><strong>用途：</strong> 明确角色外貌特征和性格表现</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="slide-footer">
      <div class="slide-number">7 / 16</div>
      <div class="slide-progress"><div class="slide-progress-bar pct-43-7"></div></div>
      <div class="slide-title">视觉参考图集</div>
    </footer>
  </div>
</body>
</html>
