<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案例2：每日新闻推送 - 幻灯片11</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/slides.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* 给左边大框中的文字框添加颜色填充 */
    .section-card {
      background: var(--gradient-info);
      color: var(--color-dark);
      border: var(--border-sharp);
      padding: var(--spacing-lg);
      border-radius: calc(var(--pixel-size) * 3);
    }
    /* 确保列可以滚动 */
    .two-column-layout .column {
      min-height: 0;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="slide-page slide-page-bg animate-fade">
    <header class="slide-header">
      <h1 class="slide-title">案例2：情报推送</h1>
      <p class="slide-subtitle">MY PERSONAL NEWS AGENT</p>
    </header>

    <main class="slide-content">
      <div class="two-column-layout">
        <div class="column">
          <h2 class="column-title">自动化流程</h2>
          <div class="section-card">
            <ul class="pixel-list">
              <li class="pixel-list-item"><strong>抓取：</strong> GitHub Actions 定时运行</li>
              <li class="pixel-list-item"><strong>处理：</strong> AI 去重、提取核心摘要</li>
              <li class="pixel-list-item"><strong>投递：</strong> 整理成每日简报发往邮箱</li>
            </ul>
          </div>
        </div>

        <div class="column">
          <h2 class="column-title">核心价值</h2>
          <div class="pixel-card-grid grid-1-col">
            <div class="pixel-card-item bg-secondary">
              <div class="card-title">节省时间</div>
              <p class="card-description">无需手动刷 App，5 分钟掌握天下要闻</p>
            </div>
            <div class="pixel-card-item bg-accent">
              <div class="card-title">定制内容</div>
              <p class="card-description">只看我想看的，过滤噪音干扰</p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="slide-footer">
      <div class="slide-number">11 / 16</div>
      <div class="slide-progress"><div class="slide-progress-bar pct-68-8"></div></div>
      <div class="slide-title">案例2：情报推送</div>
    </footer>
  </div>
</body>
</html>
