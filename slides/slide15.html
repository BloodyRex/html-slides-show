<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>总结语 - 幻灯片15</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/slides.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .gold-box {
      box-shadow: 6px 6px 0 black;
      line-height: 1.6;
    }
    .highlight-span {
      background: white;
      padding: 4px 8px;
    }
    .quote-text {
      text-shadow: 2px 2px 0 black;
    }
  </style>
</head>
<body>
  <div class="slide-page slide-page-bg animate-fade">
    <main class="slide-content flex-center">
      <div class="text-center max-w-800">
        <div class="highlight-box p-4 bg-accent color-dark border-sharp gold-box">
          <h1 class="font-pixel h2 color-dark text-shadow-none">
            AI 不会替代你，<br>
            但会用 AI 并会造工具的人，<br>
            <span class="color-primary highlight-span">正在替代只会用 AI 的人。</span>
          </h1>
        </div>
        <p class="mt-4 italic font-1-2 opacity-0-8 color-white quote-text">
          "把你手头最烦琐的那件小事，变成 AI 的一个固定 '技能'。"
        </p>
      </div>
    </main>

    <footer class="slide-footer">
      <div class="slide-number">15 / 16</div>
      <div class="slide-progress"><div class="slide-progress-bar pct-93-75"></div></div>
      <div class="slide-title">结语：核心洞察</div>
    </footer>
  </div>
</body>
</html>
