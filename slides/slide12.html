<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>展望未来：AI 与人的边界 - 幻灯片12</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/slides.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .two-column-layout .column {
      min-height: 0;
      overflow-y: auto;
      padding: 10px;
    }
    .pixel-card.bg-secondary {
      background: var(--color-dark) !important;
      color: white !important;
      border: 2px solid white;
    }
    .pixel-card.bg-accent {
      background: var(--color-accent) !important;
      color: var(--color-dark) !important;
      border: 2px solid var(--color-dark);
    }
    .pixel-card .pixel-list-item {
      background: transparent !important;
      color: inherit !important;
      border-color: rgba(255,255,255,0.2) !important;
    }
    .pixel-card {
      padding: var(--spacing-md) !important;
      line-height: 1.4;
      min-height: 320px !important;
    }
    .pixel-list-item {
      font-size: 1.1rem !important;
      margin-bottom: 8px;
    }
    .core-concept-text {
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="slide-page slide-page-bg animate-fade">
    <header class="slide-header">
      <h1 class="slide-title">展望未来：AI 与人的边界</h1>
      <p class="slide-subtitle">AI & HUMAN BOUNDARIES</p>
    </header>

    <main class="slide-content">
      <div class="two-column-layout">
        <div class="column">
          <h2 class="column-title">AI 做什么？</h2>
          <div class="pixel-card bg-secondary">
            <ul class="pixel-list mt-2">
              <li class="pixel-list-item"><strong>海量阅读：</strong> 瞬间消化上百万字资料</li>
              <li class="pixel-list-item"><strong>逻辑推演：</strong> 严格执行复杂的判断流程</li>
              <li class="pixel-list-item"><strong>工业生产：</strong> 24小时不间断的稳定产出</li>
              <li class="pixel-list-item"><strong>辅助润色：</strong> 自动修正语法与排版错误</li>
            </ul>
          </div>
        </div>

        <div class="column">
          <h2 class="column-title">人做什么？</h2>
          <div class="pixel-card bg-accent">
            <ul class="pixel-list mt-2">
              <li class="pixel-list-item"><strong>审美定义：</strong> 决定什么是"美"</li>
              <li class="pixel-list-item"><strong>情感联结：</strong> 产生跨越屏幕的真诚共鸣</li>
              <li class="pixel-list-item"><strong>价值判断：</strong> 定义创作的真实动机</li>
              <li class="pixel-list-item"><strong>终极把关：</strong> 对产出质量进行最后的审核</li>
            </ul>
          </div>
        </div>
      </div>

      <div class="colorful-text-box accent mt-4">
        <p class="font-pixel core-concept-text"><strong>核心观点：</strong> 技术解决效率，人解决灵魂。AI 不会取代创作者，但会取代不会用 AI 的人。</p>
      </div>
    </main>

    <footer class="slide-footer">
      <div class="slide-number">12 / 16</div>
      <div class="slide-progress"><div class="slide-progress-bar pct-75"></div></div>
      <div class="slide-title">展望未来：AI 与人的边界</div>
    </footer>
  </div>
</body>
</html>
